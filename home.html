<!Doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">


    <title>Favorite Singers</title>
  </head>
  <body class="bg-dark">
    <div class="container-fluid pt-5 my-5 border">
    <h1 class="text-light display-1 text-center">Favorite Singers</h1>
    <hr class="text-light" />
      <div class="row">
        <div class="col-sm-4">
          <img src="images/music.jpg" alt="The word music shown in colorful block letters against a white and black background with music related drawn graphics" title="music graphic" class="img-thumbnail">
        </div>
        <div class="col-sm-8">
          <table class="table table-dark table-striped">
            <thead>
              <tr>
                <th>Stage Name</th>
                <th>Favorite Song</th>
                <th>Genre</th>
                <th>Zodiac Sign</th>
              </tr>
            </thead>
            <tbody id="favoriteSingersTable">
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
